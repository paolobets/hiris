name: 🐛 Bug report
description: Report a reproducible bug in HIRIS
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much of the form as you can — the more we know, the faster we can fix it.

        ⚠️ **For security issues, do NOT open a public bug report.** See the [Security Policy](../SECURITY.md).

  - type: input
    id: version
    attributes:
      label: HIRIS version
      description: Visible in the add-on UI footer, or `gh release view`.
      placeholder: "e.g. v0.10.15"
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant Core version
      placeholder: "e.g. 2026.4.2"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - HACS (recommended)
        - Manual repo add to Supervisor
        - Local clone / dev install
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the Agent Designer
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: From Settings → Add-ons → HIRIS → Log. Please redact API keys.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues and did not find a duplicate.
          required: true
        - label: I have redacted secrets (API keys, tokens) from logs and screenshots.
          required: true
