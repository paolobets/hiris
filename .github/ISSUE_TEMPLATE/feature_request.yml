name: ✨ Feature request
description: Suggest a new feature or improvement for HIRIS
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A clear and concise description of the user need. Avoid jumping to a solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: How might HIRIS solve it? Skip if you'd rather discuss.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, agents, or workarounds you've tried.

  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this touch?
      multiple: true
      options:
        - Agent Designer (config.html)
        - Lovelace card
        - Agent runtime / runner
        - HA integration (triggers, actions, proposals)
        - Backend API
        - Documentation
        - Other
