<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIRIS — Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    #sidebar {
      width: 240px;
      border-right: 1px solid #2d2d4a;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 0.5rem;
      overflow-y: auto;
    }
    #sidebar h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 0.25rem; }
    .agent-item {
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      background: #1a1a2e;
      border: 1px solid #2d2d4a;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .agent-item .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      display: inline-block; margin-right: 0.5rem;
      background: #22c55e;
    }
    .agent-item .status-dot.off { background: #64748b; }
    #sidebar a.config-link {
      margin-top: auto;
      color: #7c86b8;
      font-size: 0.8rem;
      text-decoration: none;
      padding-top: 1rem;
      border-top: 1px solid #2d2d4a;
    }
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #header {
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #2d2d4a;
      font-size: 0.9rem;
      color: #94a3b8;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg { max-width: 70%; padding: 0.75rem 1rem; border-radius: 12px; line-height: 1.5; font-size: 0.9rem; }
    .msg.user { align-self: flex-end; background: #2d2d5a; }
    .msg.assistant { align-self: flex-start; background: #1a1a2e; border: 1px solid #2d2d4a; }
    .msg.thinking { color: #64748b; font-style: italic; }
    #input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid #2d2d4a;
      display: flex;
      gap: 0.75rem;
    }
    #input-area textarea {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2d2d4a;
      border-radius: 10px;
      color: #e2e8f0;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      resize: none;
      font-family: inherit;
    }
    #input-area textarea:focus { outline: none; border-color: #4a4a8a; }
    #input-area button {
      background: #4a4a8a;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 1.25rem;
      cursor: pointer;
      font-size: 0.9rem;
    }
    #input-area button:hover { background: #5a5a9a; }
    #input-area button:disabled { background: #2d2d4a; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>Agents</h2>
    <div id="agent-list"></div>
    <a class="config-link" href="config">+ Configura agenti</a>
  </div>
  <div id="main">
    <div id="header">HIRIS — Home Intelligent Reasoning &amp; Integration System</div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="input" placeholder="Scrivi un messaggio…" rows="2"></textarea>
      <button id="send-btn">Invia</button>
    </div>
  </div>
  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const agentListEl = document.getElementById('agent-list');

    let history = [];

    async function loadAgents() {
      try {
        const r = await fetch('api/agents');
        const agents = await r.json();
        agentListEl.innerHTML = '';
        agents.forEach(a => {
          const div = document.createElement('div');
          div.className = 'agent-item';
          div.innerHTML = `<span class="status-dot ${a.enabled ? '' : 'off'}"></span>${a.name}`;
          agentListEl.appendChild(div);
        });
      } catch (e) { /* ignore */ }
    }

    function appendMsg(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      sendBtn.disabled = true;
      appendMsg('user', text);
      const thinking = appendMsg('assistant thinking', 'Sto ragionando…');
      try {
        const r = await fetch('api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message: text, history}),
        });
        const data = await r.json();
        thinking.remove();
        appendMsg('assistant', data.response || data.error || 'Errore');
        history.push({role: 'user', content: text});
        history.push({role: 'assistant', content: data.response || ''});
        if (history.length > 40) history = history.slice(-40);
      } catch (e) {
        thinking.textContent = 'Errore di connessione.';
        thinking.className = 'msg assistant';
      }
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    loadAgents();
    setInterval(loadAgents, 30000);
  </script>
</body>
</html>
