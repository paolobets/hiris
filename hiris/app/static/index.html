<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HIRIS</title>
  <link rel="icon" type="image/svg+xml" href="static/hiris-icon.svg">
  <style>
    :root {
      --bg:               #F9FAFB;
      --surface:          #FFFFFF;
      --surface-hover:    #F3F4F6;
      --text:             #111827;
      --text-muted:       #6B7280;
      --border:           #E5E7EB;
      --input-bg:         #F9FAFB;
      --accent:           #2563EB;
      --accent-hover:     #1D4ED8;
      --accent-muted:     #93C5FD;
      --accent-bg:        #EFF6FF;
      --accent-bg-hover:  #DBEAFE;
      --dot-on:           #10B981;
      --dot-off:          #D1D5DB;
      --user-bubble-bg:   #2563EB;
      --user-bubble-text: #FFFFFF;
      --bot-bubble-bg:    #FFFFFF;
      --bot-bubble-border:#E5E7EB;
      --scrollbar:        #E5E7EB;
      --conn-on:          #10B981;
      --conn-on-shadow:   #D1FAE5;
      --conn-off:         #EF4444;
      --conn-off-shadow:  #FEE2E2;
      --badge-monitor-bg: #DBEAFE;
      --badge-monitor-text:#1D4ED8;
      --badge-reactive-bg:#D1FAE5;
      --badge-reactive-text:#065F46;
      --badge-preventive-bg:#FEF3C7;
      --badge-preventive-text:#92400E;
      --badge-chat-bg:    #EDE9FE;
      --badge-chat-text:  #5B21B6;
      --badge-off-bg:     #F3F4F6;
      --chip-border:      #BFDBFE;
      --avatar-bg:        #EDE9FE;
    }

    [data-theme="dark"] {
      --bg:               #0F172A;
      --surface:          #1E293B;
      --surface-hover:    #334155;
      --text:             #F1F5F9;
      --text-muted:       #94A3B8;
      --border:           #334155;
      --input-bg:         #1E293B;
      --accent:           #3B82F6;
      --accent-hover:     #2563EB;
      --accent-muted:     #1D4ED8;
      --accent-bg:        #1E3A5F;
      --accent-bg-hover:  #1E40AF;
      --dot-on:           #34D399;
      --dot-off:          #475569;
      --user-bubble-bg:   #3B82F6;
      --user-bubble-text: #FFFFFF;
      --bot-bubble-bg:    #1E293B;
      --bot-bubble-border:#334155;
      --scrollbar:        #334155;
      --conn-on:          #34D399;
      --conn-on-shadow:   #064E3B;
      --conn-off:         #F87171;
      --conn-off-shadow:  #7F1D1D;
      --badge-monitor-bg: #1E3A5F;
      --badge-monitor-text:#93C5FD;
      --badge-reactive-bg:#064E3B;
      --badge-reactive-text:#6EE7B7;
      --badge-preventive-bg:#78350F;
      --badge-preventive-text:#FCD34D;
      --badge-chat-bg:    #3B0764;
      --badge-chat-text:  #C4B5FD;
      --badge-off-bg:     #334155;
      --chip-border:      #1D4ED8;
      --avatar-bg:        #3B0764;
    }

    @media (prefers-color-scheme: dark) {
      html:not([data-theme="light"]) {
        --bg:               #0F172A;
        --surface:          #1E293B;
        --surface-hover:    #334155;
        --text:             #F1F5F9;
        --text-muted:       #94A3B8;
        --border:           #334155;
        --input-bg:         #1E293B;
        --accent:           #3B82F6;
        --accent-hover:     #2563EB;
        --accent-muted:     #1D4ED8;
        --accent-bg:        #1E3A5F;
        --accent-bg-hover:  #1E40AF;
        --dot-on:           #34D399;
        --dot-off:          #475569;
        --user-bubble-bg:   #3B82F6;
        --user-bubble-text: #FFFFFF;
        --bot-bubble-bg:    #1E293B;
        --bot-bubble-border:#334155;
        --scrollbar:        #334155;
        --conn-on:          #34D399;
        --conn-on-shadow:   #064E3B;
        --conn-off:         #F87171;
        --conn-off-shadow:  #7F1D1D;
        --badge-monitor-bg: #1E3A5F;
        --badge-monitor-text:#93C5FD;
        --badge-reactive-bg:#064E3B;
        --badge-reactive-text:#6EE7B7;
        --badge-preventive-bg:#78350F;
        --badge-preventive-text:#FCD34D;
        --badge-chat-bg:    #3B0764;
        --badge-chat-text:  #C4B5FD;
        --badge-off-bg:     #334155;
        --chip-border:      #1D4ED8;
        --avatar-bg:        #3B0764;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    #app { display: flex; height: 100dvh; }

    /* SIDEBAR */
    #sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    #sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }
    #sidebar-header h2 {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    #agent-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .agent-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--text);
      transition: background 0.15s;
    }
    .agent-item:hover { background: var(--surface-hover); }
    .agent-item.agent-active { background: var(--accent-bg); }
    .agent-item.agent-active:hover { background: var(--accent-bg-hover); }
    .badge {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      margin-left: auto;
      white-space: nowrap;
    }
    .badge-monitor    { background: var(--badge-monitor-bg); color: var(--badge-monitor-text); }
    .badge-reactive   { background: var(--badge-reactive-bg); color: var(--badge-reactive-text); }
    .badge-preventive { background: var(--badge-preventive-bg); color: var(--badge-preventive-text); }
    .badge-chat       { background: var(--badge-chat-bg); color: var(--badge-chat-text); }
    .badge-off        { background: var(--badge-off-bg); color: #9CA3AF; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-on  { background: var(--dot-on); }
    .dot-off { background: var(--dot-off); }
    #sidebar-footer {
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    #sidebar-footer a {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    #sidebar-footer a:hover { color: var(--text); }
    #usage-widget {
      font-size: 0.7rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    #usage-widget .usage-row { display: flex; justify-content: space-between; align-items: center; }
    #usage-widget .usage-label { opacity: 0.7; }
    #usage-widget .usage-val { font-variant-numeric: tabular-nums; }

    /* MAIN */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* HEADER */
    #header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    #header-icon { font-size: 1.4rem; }
    #header-title { font-size: 1rem; font-weight: 600; }
    #header-subtitle { font-size: 0.72rem; color: #9CA3AF; }
    #conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      margin-left: auto;
      background: var(--conn-on);
      box-shadow: 0 0 0 2px var(--conn-on-shadow);
      transition: background 0.3s, box-shadow 0.3s;
    }
    #conn-dot.offline { background: var(--conn-off); box-shadow: 0 0 0 2px var(--conn-off-shadow); }

    /* MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    /* WELCOME */
    #welcome {
      margin: auto;
      text-align: center;
      max-width: 360px;
      padding: 2rem 0;
    }
    #welcome .welcome-icon { font-size: 2.5rem; margin-bottom: 0.75rem; display:flex; justify-content:center; }
    #welcome h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.4rem; }
    #welcome p  { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .quick-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
    .chip {
      background: var(--accent-bg);
      color: var(--accent-hover);
      border: 1px solid var(--chip-border);
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .chip:hover { background: var(--accent-bg-hover); }

    /* BUBBLES */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      max-width: 80%;
    }
    .msg-row.user      { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.assistant { align-self: flex-start; }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--avatar-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .bubble {
      padding: 0.65rem 1rem;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 0.875rem;
      word-break: break-word;
    }
    .msg-row.user      .bubble { background: var(--user-bubble-bg); color: var(--user-bubble-text); border-bottom-right-radius: 4px; }
    .msg-row.assistant .bubble { background: var(--bot-bubble-bg); color: var(--text); border: 1px solid var(--bot-bubble-border); border-bottom-left-radius: 4px; }
    .msg-col { display: flex; flex-direction: column; }
    .msg-row.user      .msg-col { align-items: flex-end; }
    .msg-row.assistant .msg-col { align-items: flex-start; }
    .msg-time { font-size: 0.65rem; color: #9CA3AF; margin-top: 0.25rem; padding: 0 0.25rem; }

    /* DEBUG TOOLS */
    .debug-row { align-self: flex-start; margin-left: 36px; margin-top: -0.5rem; }
    .debug-summary {
      font-size: 0.68rem; color: var(--text-muted); cursor: pointer;
      padding: 0.15rem 0.4rem; border-radius: 6px; display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .debug-summary:hover { background: var(--surface-hover); }
    .debug-body {
      font-size: 0.7rem; color: var(--text-muted); background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.75rem;
      margin-top: 0.25rem; font-family: monospace;
    }
    .debug-tool { margin-bottom: 0.25rem; }
    .debug-tool:last-child { margin-bottom: 0; }

    /* TYPING */
    .typing-row { display: flex; align-items: flex-end; gap: 0.5rem; align-self: flex-start; }
    .typing-bubble {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 0.75rem 1rem;
      display: flex; gap: 4px; align-items: center;
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #9CA3AF;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* INPUT */
    #input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 0.6rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--input-bg);
      resize: none;
      overflow-y: auto;
      max-height: 8rem;
      line-height: 1.5;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      touch-action: manipulation;
    }
    #input:focus { outline: none; border-color: var(--accent-muted); background: var(--surface); }
    #input::placeholder { color: #9CA3AF; }
    #send-btn {
      width: 44px; height: 44px;
      background: var(--accent);
      border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s;
      touch-action: manipulation;
    }
    #send-btn:hover    { background: var(--accent-hover); }
    #send-btn:active   { background: var(--accent-hover); transform: scale(0.94); }
    #send-btn:disabled { background: var(--accent-muted); cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: white; }

    /* SCROLLBAR */
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      #sidebar { display: none; }
      .msg-row { max-width: 92%; }
      #input-area { padding: 0.5rem 0.75rem; padding-bottom: calc(0.5rem + env(safe-area-inset-bottom)); }
      #input { font-size: 1rem; }
    }
  </style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header"><h2>Agenti attivi</h2></div>
    <div id="agent-list"></div>
    <div id="sidebar-footer">
      <a href="config">&#9881; Configura agenti</a>
      <div id="usage-widget">
        <div class="usage-row">
          <span class="usage-label">&#x1F4AC; Token</span>
          <span class="usage-val" id="u-tokens">—</span>
        </div>
        <div class="usage-row">
          <span class="usage-label">&#x1F4B0; Costo</span>
          <span class="usage-val" id="u-cost">—</span>
        </div>
        <div class="usage-row">
          <span class="usage-label">&#x1F504; Richieste</span>
          <span class="usage-val" id="u-reqs">—</span>
        </div>
      </div>
    </div>
  </aside>
  <main id="main">
    <header id="header">
      <img id="header-icon" src="static/hiris-icon.svg" width="32" height="32" alt="HIRIS" style="border-radius:50%;flex-shrink:0">
      <div>
        <div id="header-title">HIRIS</div>
        <div id="header-subtitle">Home Intelligent Reasoning &amp; Integration</div>
      </div>
      <button id="new-conv-btn" onclick="clearConversation()" title="Nuova conversazione" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;color:var(--text-muted);font-size:12px;cursor:pointer;white-space:nowrap;transition:background 0.15s,color 0.15s" onmouseover="this.style.background='var(--surface-hover)';this.style.color='var(--text)'" onmouseout="this.style.background='none';this.style.color='var(--text-muted)'">&#x21BA; Nuova conv.</button>
      <div id="conn-dot" title="Connesso"></div>
    </header>
    <div id="messages">
      <div id="welcome">
        <div class="welcome-icon"><img src="static/hiris-icon.svg" width="72" height="72" alt="HIRIS" style="border-radius:50%"></div>
        <h3>Ciao! Sono HIRIS</h3>
        <p>Il tuo assistente per la smart home.<br>Chiedimi tutto ci&ograve; di cui hai bisogno.</p>
        <div class="quick-chips">
          <button class="chip" onclick="sendQuick('Stato casa')">Stato casa &#x1F3E0;</button>
          <button class="chip" onclick="sendQuick('Temperatura camere')">Temperatura &#x1F321;&#xFE0F;</button>
          <button class="chip" onclick="sendQuick('Consumi energia')">Energia &#x26A1;</button>
        </div>
      </div>
    </div>
    <div id="input-area">
      <textarea id="input" placeholder="Scrivi un messaggio&#8230;" rows="1"
        enterkeyhint="send" autocomplete="off" autocorrect="off"
        autocapitalize="sentences" spellcheck="false"></textarea>
      <button id="send-btn" title="Invia">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div id="turn-counter" style="display:none;font-size:11px;text-align:right;padding:2px 8px 4px 0;color:var(--text-muted)"></div>
    <div id="session-ended-msg" style="display:none;font-size:12px;text-align:center;padding:6px 8px;color:var(--conn-off);background:var(--surface);border-top:1px solid var(--border)">Sessione completata &#8212; avvia una nuova conversazione</div>
  </main>
</div>
<script>
/* Iris Petali avatar — inline SVG used for all agent bubbles */
var HIRIS_AVATAR = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="28" height="28" style="display:block;border-radius:50%">'
  + '<circle cx="50" cy="50" r="50" fill="#1a0533"/>'
  + '<g transform="translate(50,50)">'
  + '<path d="M0 0 C-4.2 -9 -5.1 -31.2 0 -43 C5.1 -31.2 4.2 -9 0 0 Z" fill="#c084fc"/>'
  + '<path d="M0 0 C-4.2 -9 -5.1 -31.2 0 -43 C5.1 -31.2 4.2 -9 0 0 Z" fill="#818cf8" transform="rotate(60)"/>'
  + '<path d="M0 0 C-4.2 -9 -5.1 -31.2 0 -43 C5.1 -31.2 4.2 -9 0 0 Z" fill="#60a5fa" transform="rotate(120)"/>'
  + '<path d="M0 0 C-4.2 -9 -5.1 -31.2 0 -43 C5.1 -31.2 4.2 -9 0 0 Z" fill="#22d3ee" transform="rotate(180)"/>'
  + '<path d="M0 0 C-4.2 -9 -5.1 -31.2 0 -43 C5.1 -31.2 4.2 -9 0 0 Z" fill="#2dd4bf" transform="rotate(240)"/>'
  + '<path d="M0 0 C-4.2 -9 -5.1 -31.2 0 -43 C5.1 -31.2 4.2 -9 0 0 Z" fill="#e879f9" transform="rotate(300)"/>'
  + '</g>'
  + '<circle cx="50" cy="50" r="4.5" fill="white"/>'
  + '</svg>';

var messagesEl = document.getElementById('messages');
var inputEl    = document.getElementById('input');
var sendBtn    = document.getElementById('send-btn');
var agentListEl= document.getElementById('agent-list');
var welcomeEl  = document.getElementById('welcome');
var connDot    = document.getElementById('conn-dot');

var activeAgentId = 'hiris-default';
var hasMessages = false;
var agentMaxTurns = {};
var agentTurnCounts = {};

function updateTurnCounter() {
  var counter = document.getElementById('turn-counter');
  var max = agentMaxTurns[activeAgentId] || 0;
  if (!activeAgentId || max === 0) { counter.style.display = 'none'; return; }
  var current = agentTurnCounts[activeAgentId] || 0;
  counter.style.display = '';
  counter.textContent = current + ' / ' + max + ' messaggi';
  counter.style.color = current >= max ? 'var(--conn-off)' : 'var(--text-muted)';
}

function checkTurnLimit() {
  var max = agentMaxTurns[activeAgentId] || 0;
  var sessionMsg = document.getElementById('session-ended-msg');
  if (max === 0) {
    inputEl.disabled = false;
    sendBtn.disabled = false;
    if (sessionMsg) sessionMsg.style.display = 'none';
    return;
  }
  var current = agentTurnCounts[activeAgentId] || 0;
  var reached = current >= max;
  inputEl.disabled = reached;
  sendBtn.disabled = reached;
  if (sessionMsg) sessionMsg.style.display = reached ? '' : 'none';
}

async function clearConversation() {
  if (!activeAgentId) return;
  try {
    await fetch('api/agents/' + activeAgentId + '/chat-history', { method: 'DELETE' });
  } catch(e) {}
  messagesEl.innerHTML = '';
  messagesEl.appendChild(welcomeEl);
  welcomeEl.style.display = '';
  hasMessages = false;
  agentTurnCounts[activeAgentId] = 0;
  updateTurnCounter();
  checkTurnLimit();
}

async function loadAgents() {
  try {
    var r = await fetch('api/agents');
    if (!r.ok) throw new Error();
    var agents = await r.json();
    connDot.classList.remove('offline');
    agentListEl.innerHTML = '';
    var chatAgents = agents.filter(function(a) { return a.type === 'chat'; });
    chatAgents.forEach(function(a) {
      agentMaxTurns[a.id] = a.max_chat_turns || 0;
      var div = document.createElement('div');
      div.className = 'agent-item' + (a.id === activeAgentId ? ' agent-active' : '');
      div.style.cursor = 'pointer';
      div.onclick = function() { setActiveAgent(a.id, a.name); };
      div.innerHTML =
        '<div class="status-dot ' + (a.enabled ? 'dot-on' : 'dot-off') + '"></div>' +
        '<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(a.name) + '</span>' +
        (a.is_default ? '<span style="font-size:0.6rem;color:#9CA3AF;margin-left:0.25rem">default</span>' : '');
      agentListEl.appendChild(div);
    });
  } catch(e) {
    connDot.classList.add('offline');
  }
}

async function setActiveAgent(agentId, agentName) {
  if (agentId === activeAgentId) return;
  activeAgentId = agentId;
  messagesEl.innerHTML = '';
  messagesEl.appendChild(welcomeEl);
  welcomeEl.style.display = '';
  hasMessages = false;
  document.getElementById('header-title').textContent = agentName;
  agentTurnCounts[agentId] = 0;
  updateTurnCounter();
  checkTurnLimit();
  try {
    var r = await fetch('api/agents/' + agentId + '/chat-history');
    if (r.ok) {
      var data = await r.json();
      var msgs = data.messages || [];
      msgs.forEach(function(m) {
        appendMsg(m.role === 'user' ? 'user' : 'assistant', m.content);
      });
      agentTurnCounts[agentId] = msgs.filter(function(m) { return m.role === 'user'; }).length;
      updateTurnCounter();
      checkTurnLimit();
    }
  } catch(e) {}
  loadAgents();
}

function nowHHMM() {
  return new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMsg(role, text) {
  if (!hasMessages) { welcomeEl.style.display = 'none'; hasMessages = true; }
  var row = document.createElement('div');
  row.className = 'msg-row ' + role;
  var time = nowHHMM();
  var content = esc(text).replace(/\n/g,'<br>');
  if (role === 'assistant') {
    row.innerHTML =
      '<div class="avatar">' + HIRIS_AVATAR + '</div>' +
      '<div class="msg-col"><div class="bubble">' + content + '</div><div class="msg-time">' + time + '</div></div>';
  } else {
    row.innerHTML =
      '<div class="msg-col"><div class="bubble">' + content + '</div><div class="msg-time">' + time + '</div></div>';
  }
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function appendDebug(tools) {
  var row = document.createElement('div');
  row.className = 'debug-row';
  var body = tools.map(function(t) {
    var inp = JSON.stringify(t.input);
    return '<div class="debug-tool">&#x1F527; <b>' + esc(t.tool) + '</b>(' + esc(inp) + ')</div>';
  }).join('');
  row.innerHTML =
    '<details>' +
    '<summary class="debug-summary">&#x1F50D; ' + tools.length + ' tool' + (tools.length > 1 ? 's' : '') + ' chiamati</summary>' +
    '<div class="debug-body">' + body + '</div>' +
    '</details>';
  messagesEl.appendChild(row);
}

function showTyping() {
  var row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typing-indicator';
  row.innerHTML =
    '<div class="avatar">' + HIRIS_AVATAR + '</div>' +
    '<div class="typing-bubble">' +
    '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>' +
    '</div>';
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return row;
}

async function sendMessage(text) {
  text = (text !== undefined) ? text : inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  autoResize();
  sendBtn.disabled = true;
  appendMsg('user', text);
  var typing = showTyping();
  try {
    var r = await fetch('api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: text,
        agent_id: activeAgentId,
      }),
    });
    var data = await r.json();
    typing.remove();
    if (data.error === 'max_turns_reached') {
      appendMsg('assistant', 'Sessione completata. Avvia una nuova conversazione.');
      checkTurnLimit();
      return;
    }
    appendMsg('assistant', data.response || data.error || 'Errore sconosciuto');
    if (data.debug && data.debug.tools_called && data.debug.tools_called.length > 0) {
      appendDebug(data.debug.tools_called);
    }
    agentTurnCounts[activeAgentId] = (agentTurnCounts[activeAgentId] || 0) + 1;
    updateTurnCounter();
    checkTurnLimit();
  } catch(e) {
    typing.remove();
    appendMsg('assistant', 'Errore di connessione. Riprova tra poco.');
  }
  if (!inputEl.disabled) {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function sendQuick(text) { sendMessage(text); }

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 128) + 'px';
}

inputEl.addEventListener('input', autoResize);
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', function() { sendMessage(); });

async function applyTheme() {
  try {
    var r = await fetch('api/config');
    var cfg = await r.json();
    var theme = cfg.theme || 'auto';
    if (theme === 'light' || theme === 'dark') {
      document.documentElement.setAttribute('data-theme', theme);
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
  } catch(e) {}
}
async function loadUsage() {
  try {
    var r = await fetch('api/usage');
    if (!r.ok) return;
    var d = await r.json();
    var tok = (d.total_tokens || 0).toLocaleString('it-IT');
    var usd = d.cost_usd != null ? '$' + d.cost_usd.toFixed(4) : '—';
    var eur = d.cost_eur != null ? ' / €' + d.cost_eur.toFixed(4) : '';
    document.getElementById('u-tokens').textContent = tok;
    document.getElementById('u-cost').textContent = usd + eur;
    document.getElementById('u-reqs').textContent = d.total_requests || 0;
  } catch(e) {}
}

applyTheme();

loadAgents();
loadUsage();
setInterval(loadAgents, 30000);
setInterval(loadUsage, 30000);
</script>
</body>
</html>
