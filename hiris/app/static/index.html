<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIRIS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F9FAFB;
      color: #111827;
      height: 100vh;
      overflow: hidden;
    }
    #app { display: flex; height: 100vh; }

    /* SIDEBAR */
    #sidebar {
      width: 260px;
      background: #FFFFFF;
      border-right: 1px solid #E5E7EB;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    #sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid #E5E7EB;
    }
    #sidebar-header h2 {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6B7280;
    }
    #agent-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .agent-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #374151;
      transition: background 0.15s;
    }
    .agent-item:hover { background: #F3F4F6; }
    .badge {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      margin-left: auto;
      white-space: nowrap;
    }
    .badge-monitor    { background: #DBEAFE; color: #1D4ED8; }
    .badge-reactive   { background: #D1FAE5; color: #065F46; }
    .badge-preventive { background: #FEF3C7; color: #92400E; }
    .badge-chat       { background: #EDE9FE; color: #5B21B6; }
    .badge-off        { background: #F3F4F6; color: #9CA3AF; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-on  { background: #10B981; }
    .dot-off { background: #D1D5DB; }
    #sidebar-footer {
      padding: 0.75rem 1rem;
      border-top: 1px solid #E5E7EB;
    }
    #sidebar-footer a {
      color: #6B7280;
      font-size: 0.8rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    #sidebar-footer a:hover { color: #374151; }

    /* MAIN */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* HEADER */
    #header {
      background: #FFFFFF;
      border-bottom: 1px solid #E5E7EB;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    #header-icon { font-size: 1.4rem; }
    #header-title { font-size: 1rem; font-weight: 600; }
    #header-subtitle { font-size: 0.72rem; color: #9CA3AF; }
    #conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      margin-left: auto;
      background: #10B981;
      box-shadow: 0 0 0 2px #D1FAE5;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #conn-dot.offline { background: #EF4444; box-shadow: 0 0 0 2px #FEE2E2; }

    /* MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    /* WELCOME */
    #welcome {
      margin: auto;
      text-align: center;
      max-width: 360px;
      padding: 2rem 0;
    }
    #welcome .welcome-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    #welcome h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.4rem; }
    #welcome p  { font-size: 0.85rem; color: #6B7280; margin-bottom: 1.5rem; }
    .quick-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
    .chip {
      background: #EFF6FF;
      color: #1D4ED8;
      border: 1px solid #BFDBFE;
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .chip:hover { background: #DBEAFE; }

    /* BUBBLES */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      max-width: 80%;
    }
    .msg-row.user      { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.assistant { align-self: flex-start; }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #EDE9FE;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .bubble {
      padding: 0.65rem 1rem;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 0.875rem;
      word-break: break-word;
    }
    .msg-row.user      .bubble { background: #2563EB; color: #FFFFFF; border-bottom-right-radius: 4px; }
    .msg-row.assistant .bubble { background: #FFFFFF; color: #111827; border: 1px solid #E5E7EB; border-bottom-left-radius: 4px; }
    .msg-col { display: flex; flex-direction: column; }
    .msg-row.user      .msg-col { align-items: flex-end; }
    .msg-row.assistant .msg-col { align-items: flex-start; }
    .msg-time { font-size: 0.65rem; color: #9CA3AF; margin-top: 0.25rem; padding: 0 0.25rem; }

    /* TYPING */
    .typing-row { display: flex; align-items: flex-end; gap: 0.5rem; align-self: flex-start; }
    .typing-bubble {
      background: #FFFFFF; border: 1px solid #E5E7EB;
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 0.75rem 1rem;
      display: flex; gap: 4px; align-items: center;
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #9CA3AF;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* INPUT */
    #input-area {
      background: #FFFFFF;
      border-top: 1px solid #E5E7EB;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      border: 1px solid #E5E7EB;
      border-radius: 22px;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      font-family: inherit;
      color: #111827;
      background: #F9FAFB;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #input:focus { outline: none; border-color: #93C5FD; background: #FFFFFF; }
    #input::placeholder { color: #9CA3AF; }
    #send-btn {
      width: 38px; height: 38px;
      background: #2563EB;
      border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s;
    }
    #send-btn:hover    { background: #1D4ED8; }
    #send-btn:disabled { background: #93C5FD; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: white; }

    /* SCROLLBAR */
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 2px; }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      #sidebar { display: none; }
      .msg-row { max-width: 92%; }
    }
  </style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header"><h2>Agenti attivi</h2></div>
    <div id="agent-list"></div>
    <div id="sidebar-footer">
      <a href="config">&#9881; Configura agenti</a>
    </div>
  </aside>
  <main id="main">
    <header id="header">
      <span id="header-icon">&#x1F916;</span>
      <div>
        <div id="header-title">HIRIS</div>
        <div id="header-subtitle">Home Intelligent Reasoning &amp; Integration</div>
      </div>
      <div id="conn-dot" title="Connesso"></div>
    </header>
    <div id="messages">
      <div id="welcome">
        <div class="welcome-icon">&#x1F44B;</div>
        <h3>Ciao! Sono HIRIS</h3>
        <p>Il tuo assistente per la smart home.<br>Chiedimi tutto ci&ograve; di cui hai bisogno.</p>
        <div class="quick-chips">
          <button class="chip" onclick="sendQuick('Stato casa')">Stato casa &#x1F3E0;</button>
          <button class="chip" onclick="sendQuick('Temperatura camere')">Temperatura &#x1F321;&#xFE0F;</button>
          <button class="chip" onclick="sendQuick('Consumi energia')">Energia &#x26A1;</button>
        </div>
      </div>
    </div>
    <div id="input-area">
      <textarea id="input" placeholder="Scrivi un messaggio&#8230;" rows="1"></textarea>
      <button id="send-btn" title="Invia">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </main>
</div>
<script>
var messagesEl = document.getElementById('messages');
var inputEl    = document.getElementById('input');
var sendBtn    = document.getElementById('send-btn');
var agentListEl= document.getElementById('agent-list');
var welcomeEl  = document.getElementById('welcome');
var connDot    = document.getElementById('conn-dot');

var history = [];
var hasMessages = false;

var BADGE_CLASS = { monitor:'badge-monitor', reactive:'badge-reactive', preventive:'badge-preventive', chat:'badge-chat' };
var BADGE_LABEL = { monitor:'Monitor', reactive:'Reactive', preventive:'Prevent.', chat:'Chat' };

async function loadAgents() {
  try {
    var r = await fetch('api/agents');
    if (!r.ok) throw new Error();
    var agents = await r.json();
    connDot.classList.remove('offline');
    agentListEl.innerHTML = '';
    agents.forEach(function(a) {
      var div = document.createElement('div');
      div.className = 'agent-item';
      var lastRun = a.last_run ? new Date(a.last_run).toLocaleString('it-IT') : 'Mai';
      div.title = 'Ultimo run: ' + lastRun;
      var badgeClass = a.enabled ? (BADGE_CLASS[a.type] || 'badge-monitor') : 'badge-off';
      div.innerHTML =
        '<div class="status-dot ' + (a.enabled ? 'dot-on' : 'dot-off') + '"></div>' +
        '<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(a.name) + '</span>' +
        '<span class="badge ' + badgeClass + '">' + (BADGE_LABEL[a.type] || a.type) + '</span>';
      agentListEl.appendChild(div);
    });
  } catch(e) {
    connDot.classList.add('offline');
  }
}

function nowHHMM() {
  return new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMsg(role, text) {
  if (!hasMessages) { welcomeEl.style.display = 'none'; hasMessages = true; }
  var row = document.createElement('div');
  row.className = 'msg-row ' + role;
  var time = nowHHMM();
  var content = esc(text).replace(/\n/g,'<br>');
  if (role === 'assistant') {
    row.innerHTML =
      '<div class="avatar">&#x1F916;</div>' +
      '<div class="msg-col"><div class="bubble">' + content + '</div><div class="msg-time">' + time + '</div></div>';
  } else {
    row.innerHTML =
      '<div class="msg-col"><div class="bubble">' + content + '</div><div class="msg-time">' + time + '</div></div>';
  }
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  var row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typing-indicator';
  row.innerHTML =
    '<div class="avatar">&#x1F916;</div>' +
    '<div class="typing-bubble">' +
    '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>' +
    '</div>';
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return row;
}

async function sendMessage(text) {
  text = (text !== undefined) ? text : inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  autoResize();
  sendBtn.disabled = true;
  appendMsg('user', text);
  var typing = showTyping();
  try {
    var r = await fetch('api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, history: history}),
    });
    var data = await r.json();
    typing.remove();
    appendMsg('assistant', data.response || data.error || 'Errore sconosciuto');
    history.push({role:'user', content:text});
    history.push({role:'assistant', content: data.response || ''});
    if (history.length > 40) history = history.slice(-40);
  } catch(e) {
    typing.remove();
    appendMsg('assistant', 'Errore di connessione. Riprova tra poco.');
  }
  sendBtn.disabled = false;
  inputEl.focus();
}

function sendQuick(text) { sendMessage(text); }

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}

inputEl.addEventListener('input', autoResize);
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', function() { sendMessage(); });

loadAgents();
setInterval(loadAgents, 30000);
</script>
</body>
</html>
