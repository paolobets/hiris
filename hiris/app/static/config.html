<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIRIS — Agent Designer</title>
  <link rel="icon" type="image/svg+xml" href="static/hiris-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/hiris-theme.css">
  <script>
    (function() {
      try {
        var qp = new URL(window.location).searchParams.get('theme');
        if (qp === 'light' || qp === 'dark') {
          document.documentElement.setAttribute('data-theme', qp);
          return;
        }
        var saved = localStorage.getItem('hiris-theme');
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.setAttribute('data-theme', saved);
        }
      } catch(e) {}
    })();
  </script>
  <link rel="stylesheet" href="static/hiris-config-override.css">
  <link rel="stylesheet" href="static/hiris-config.css">
</head>
<body>
  <div class="app-shell">
    <aside class="side-nav" id="side-nav"></aside>
    <main>
      <header class="page-chrome" id="page-chrome"></header>
      <div class="page-main" id="route-outlet"></div>
    </main>
  </div>

  <template id="tpl-side-nav">
    <div class="brand">
      <img src="static/hiris-icon.svg" alt="HIRIS">
      <span class="brand-name">HIRIS<small id="hc-version-side"></small></span>
    </div>
    <div class="nav-section-label">Configurazione</div>
    <a class="nav-item" href="#/" data-route="dashboard">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      </span>
      <span class="nav-label">Dashboard</span>
    </a>
    <a class="nav-item" href="#/agents" data-route="agents">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M3 21c0-4 4-7 9-7s9 3 9 7"/></svg>
      </span>
      <span class="nav-label">Agenti</span>
      <span class="nav-badge" id="nav-agents-count">—</span>
    </a>
    <a class="nav-item" href="#/proposals" data-route="proposals">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20l-7-3V7l7-3 7 3v10z"/><path d="M12 4v16"/></svg>
      </span>
      <span class="nav-label">Proposte</span>
      <span class="nav-badge" id="nav-proposals-count">—</span>
    </a>
    <a class="nav-item" href="#/usage" data-route="usage">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 4 8-8"/><path d="M14 8h7v7"/></svg>
      </span>
      <span class="nav-label">Consumi</span>
    </a>
    <div class="nav-spacer"></div>
    <!-- v0.10.5: rimosso Settings nav (era solo placeholder "Implementata in
         Phase 11" → confondeva l'utente). Sarà aggiunto quando avrà contenuto reale. -->
    <a class="nav-item" href="./" title="Vai alla chat">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </span>
      <span class="nav-label">Vai alla chat</span>
    </a>
  </template>

  <template id="tpl-page-chrome">
    <div class="crumb">
      <span>casa</span>
      <span class="seg">›</span>
      <span class="here" id="chrome-here">…</span>
    </div>
    <div class="chrome-actions">
      <button class="btn-icon-only" id="theme-toggle" title="Cambia tema" aria-label="Cambia tema chiaro/scuro">
        <svg id="ic-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="visibility:hidden"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <svg id="ic-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="visibility:hidden"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
    </div>
  </template>

  <template id="tpl-agent-editor">
    <div class="editor-grid">
      <div class="editor-content">
        <section class="section-card" id="sec-identita">
          <div class="sc-header"><span class="sc-num">01</span><h2 class="sc-title">Identità &amp; Trigger</h2></div>
          <p class="sc-desc">Nome, tipo e quando l'agente si attiva.</p>
          <div class="sc-body" id="sc-body-identita"></div>
        </section>
        <section class="section-card" id="sec-istruzioni">
          <div class="sc-header"><span class="sc-num">02</span><h2 class="sc-title">Istruzioni</h2></div>
          <p class="sc-desc">Cosa l'agente sa della casa e cosa deve fare.</p>
          <div class="sc-body" id="sc-body-istruzioni"></div>
        </section>
        <section class="section-card" id="sec-modello">
          <div class="sc-header"><span class="sc-num">03</span><h2 class="sc-title">Modello AI</h2></div>
          <p class="sc-desc">Quale modello usa, budget token, livello reasoning.</p>
          <div class="sc-body" id="sc-body-modello"></div>
        </section>
        <section class="section-card" id="sec-permessi">
          <div class="sc-header"><span class="sc-num">04</span><h2 class="sc-title">Permessi</h2></div>
          <p class="sc-desc">Quali tool e quali entità HA può leggere o usare.</p>
          <div class="sc-body" id="sc-body-permessi"></div>
        </section>
        <section class="section-card" id="sec-azioni">
          <div class="sc-header"><span class="sc-num">05</span><h2 class="sc-title">Azioni</h2></div>
          <p class="sc-desc">Cosa fa l'agente quando la valutazione attiva una regola.</p>
          <div class="sc-body" id="sc-body-azioni"></div>
        </section>
        <section class="section-card" id="sec-stato">
          <div class="sc-header"><span class="sc-num">06</span><h2 class="sc-title">Abilitazione</h2></div>
          <p class="sc-desc">Quando l'agente è abilitato e se chiede conferma.</p>
          <div class="sc-body" id="sc-body-stato"></div>
        </section>
        <section class="section-card" id="sec-log">
          <div class="sc-header"><span class="sc-num">07</span><h2 class="sc-title">Log esecuzioni</h2></div>
          <p class="sc-desc">Ultimi 20 run. Click su una riga per il dettaglio.</p>
          <div class="sc-body" id="sc-body-log"></div>
        </section>
        <section class="section-card" id="sec-run">
          <div class="sc-header"><span class="sc-num">08</span><h2 class="sc-title">Test Run</h2></div>
          <p class="sc-desc">Ultimo Test Run lanciato manualmente. Non esegue azioni reali.</p>
          <div class="sc-body" id="sc-body-run"></div>
        </section>
        <section class="section-card" id="sec-consumi">
          <div class="sc-header"><span class="sc-num">09</span><h2 class="sc-title">Consumi agente</h2></div>
          <p class="sc-desc">Conteggio richieste, token e costo stimato.</p>
          <div class="sc-body" id="sc-body-consumi"></div>
        </section>
        <div class="sticky-actions" id="sticky-actions">
          <span class="sa-status" id="sa-status">Salvato ✓</span>
          <span class="sa-spacer"></span>
          <button class="btn btn-ghost" id="btn-cancel">Annulla</button>
          <button class="btn" id="btn-test-run"><span class="spinner"></span>▶ Test Run</button>
          <button class="btn btn-danger" id="btn-delete" style="display:none">Elimina</button>
          <button class="btn btn-primary" id="btn-save" disabled>Salva</button>
        </div>
      </div>
      <aside class="anchor-nav" id="anchor-nav">
        <div class="an-label">Indice</div>
        <a class="anchor-link" href="#sec-identita"><span>01</span><span>Identità &amp; Trigger</span></a>
        <a class="anchor-link" href="#sec-istruzioni"><span>02</span><span>Istruzioni</span></a>
        <a class="anchor-link" href="#sec-modello"><span>03</span><span>Modello AI</span></a>
        <a class="anchor-link" href="#sec-permessi"><span>04</span><span>Permessi</span></a>
        <a class="anchor-link" href="#sec-azioni"><span>05</span><span>Azioni</span></a>
        <a class="anchor-link" href="#sec-stato"><span>06</span><span>Abilitazione</span></a>
        <a class="anchor-link" href="#sec-log"><span>07</span><span>Log esecuzioni</span></a>
        <a class="anchor-link" href="#sec-run"><span>08</span><span>Test Run</span></a>
        <a class="anchor-link" href="#sec-consumi"><span>09</span><span>Consumi agente</span></a>
      </aside>
    </div>
  </template>

  <!-- Drawer + Popover container (mounted by atom modules in Phase 3) -->
  <div id="drawer-container"></div>
  <div id="popover-container"></div>

  <!-- Scripts (ordine importante: state → router → api → main).
       I moduli legacy (templates, cron, triggers, permessi, action-editor,
       logs, usage, proposals, agent-form) hanno DOM access top-level ai
       loro target del vecchio markup e qui andrebbero in TypeError.
       Saranno ri-caricati quando le route reali (Phase 4-9) montano i
       relativi target DOM nelle template, oppure rifattorizzati inline. -->
  <script src="static/config/state.js"></script>
  <script src="static/config/router.js"></script>
  <script src="static/config/api.js"></script>
  <!-- v0.10.5: drawer + popover atom modules MUST be loaded before agent-editor.js,
       altrimenti HirisDrawer/HirisPopover sono undefined → script-action.js
       (+Aggiungi azione) e cron-popover.js (cron chip) non funzionano. -->
  <script src="static/config/drawer.js"></script>
  <script src="static/config/popover.js"></script>
  <script src="static/config/agent-editor.js"></script>
  <script src="static/config/dashboard.js"></script>
  <script src="static/config/agents-list.js"></script>
  <script src="static/config/proposals-route.js"></script>
  <script src="static/config/usage-route.js"></script>
  <script src="static/config/main.js"></script>
</body>
</html>
