<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIRIS — Agent Designer</title>
  <link rel="icon" type="image/svg+xml" href="static/hiris-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/hiris-theme.css">
  <script>
    (function() {
      try {
        var qp = new URL(window.location).searchParams.get('theme');
        if (qp === 'light' || qp === 'dark') {
          document.documentElement.setAttribute('data-theme', qp);
          return;
        }
        var saved = localStorage.getItem('hiris-theme');
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.setAttribute('data-theme', saved);
        }
      } catch(e) {}
    })();
  </script>
  <link rel="stylesheet" href="static/hiris-config-override.css">
  <link rel="stylesheet" href="static/hiris-config.css">
</head>
<body>
  <div class="app-shell">
    <aside class="side-nav" id="side-nav"></aside>
    <main>
      <header class="page-chrome" id="page-chrome"></header>
      <div class="page-main" id="route-outlet"></div>
    </main>
  </div>

  <!-- Drawer + Popover container (mounted by atom modules in Phase 3) -->
  <div id="drawer-container"></div>
  <div id="popover-container"></div>

  <!-- Scripts (ordine importante: state → router → api → modules legacy → main) -->
  <script src="static/config/state.js"></script>
  <script src="static/config/router.js"></script>
  <script src="static/config/api.js"></script>
  <!-- Modules legacy mantenuti per compatibilità durante migrazione (rimossi in Phase 11) -->
  <script src="static/config/templates.js"></script>
  <script src="static/config/cron.js"></script>
  <script src="static/config/triggers.js"></script>
  <script src="static/config/permessi.js"></script>
  <script src="static/config/action-editor.js"></script>
  <script src="static/config/logs.js"></script>
  <script src="static/config/usage.js"></script>
  <script src="static/config/proposals.js"></script>
  <script src="static/config/agent-form.js"></script>
  <!-- Bootstrap -->
  <script src="static/config/main.js"></script>
</body>
</html>
