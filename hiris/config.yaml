name: "HIRIS"
version: "0.14.8"
slug: "hiris"
description: >-
  Home Intelligent Reasoning & Integration System.
  AI-powered agent platform for smart home management.
  Combines Claude AI reasoning with Home Assistant automation.
url: "https://github.com/paolobets/hiris"
homeassistant: "2023.1.0"
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
panel_icon: mdi:home-automation
panel_title: HIRIS
startup: services
stage: experimental
init: false
map:
  - config:rw
hassio_api: true
homeassistant_api: true
# v0.10.11: porta 8099 esponibile via HA UI per debug remoto (sviluppo,
# diagnostica). Default `null` = NON esposta. User imposta host port nella
# sezione Network di HA UI per attivare il binding host→container.
# Inoltre l'opzione debug_expose_port deve essere attivata per logging
# warning + ricordare il rischio di esposizione su LAN senza HTTPS.
ports:
  "8099/tcp": null
ports_description:
  "8099/tcp": >-
    HIRIS API (DEBUG) — imposta a 8099 e abilita debug_expose_port nelle
    opzioni SOLO durante sessioni dev/diagnostica. Lascia vuoto in produzione.

options:
  # ── AI Providers ──────────────────────────────────────────────────────────
  claude_api_key: ""
  openai_api_key: ""
  openrouter_api_key: ""
  hide_free_models: false
  primary_model: "claude-sonnet-4-6"
  llm_strategy: "balanced"

  # ── Local Model (Ollama) ──────────────────────────────────────────────────
  local_model:
    url: ""
    model: ""
    request_timeout: 120

  # ── MQTT ─────────────────────────────────────────────────────────────────
  mqtt:
    host: ""
    port: 1883
    user: ""
    password: ""

  # ── Memory & RAG ──────────────────────────────────────────────────────────
  memory:
    embedding_provider: ""
    embedding_model: ""
    rag_k: 5
    retention_days: 90

  # ── General ───────────────────────────────────────────────────────────────
  internal_token: ""
  # ── Execute-API (MCP gateway) ─────────────────────────────────────────────
  # Allowlist server-side dei tool eseguibili via POST /api/execute (gated da
  # internal_token). Vuoto = nessun tool esposto (fail-closed). Le whitelist
  # entità/servizi (glob CSV, es. light.*) vincolano ulteriormente il gateway.
  execute_api_tools: ""
  execute_api_entities: ""
  execute_api_services: ""
  # CR-1: CIDR sorgenti fidate per il bypass-ingress (X-Ingress-Path). Solo le
  # richieste da questi range sono trattate come ingress del Supervisor; tutto
  # il resto richiede internal_token. Default = rete Docker standard del
  # Supervisor. Restringi (es. 172.30.32.2/32) se esponi la API a un tunnel.
  supervisor_ingress_cidr: "172.30.32.0/23"
  log_level: "info"
  theme: "auto"
  apprise_urls: []
  history_retention_days: 90

  # ── Mayan EDMS (documenti) ────────────────────────────────────────────────
  mayan:
    url: ""            # es. http://192.168.1.31:8090/api/v4
    token: ""          # API token Mayan
    tag_id: 0          # id del tag "HIRIS" da ingerire (0 = disabilitato)
    sensitivity: "sensitive"
    poll_minutes: 60

  # ── Debug ─────────────────────────────────────────────────────────────────
  # v0.10.11: toggle che logga warning quando il port mapping host (Network)
  # è abilitato. Esponendo HIRIS direttamente sulla LAN, qualsiasi client
  # locale può raggiungere /api/* (protetto solo da internal_token se settato).
  # USA SOLO PER DEV/DIAGNOSTICA. Disattiva quando finito.
  debug_expose_port: false

schema:
  # ── AI Providers ──────────────────────────────────────────────────────────
  claude_api_key: password
  openai_api_key: password
  openrouter_api_key: password
  hide_free_models: bool?
  primary_model: str
  llm_strategy: "list(balanced|cost_first|quality_first)"

  # ── Local Model (Ollama) ──────────────────────────────────────────────────
  local_model:
    url: str
    model: str
    request_timeout: int(10,1800)?

  # ── MQTT ─────────────────────────────────────────────────────────────────
  mqtt:
    host: str
    port: int
    user: str
    password: password

  # ── Memory & RAG ──────────────────────────────────────────────────────────
  memory:
    embedding_provider: str
    embedding_model: str
    rag_k: int
    retention_days: int

  # ── General ───────────────────────────────────────────────────────────────
  internal_token: password
  execute_api_tools: "str?"
  execute_api_entities: "str?"
  execute_api_services: "str?"
  supervisor_ingress_cidr: "str?"
  log_level: "list(debug|info|warning|error)"
  theme: "list(light|dark|auto)"
  apprise_urls:
    - str
  history_retention_days: int

  # ── Mayan EDMS (documenti) ────────────────────────────────────────────────
  mayan:
    url: str
    token: password
    tag_id: int
    sensitivity: "list(normal|sensitive)"
    poll_minutes: int(5,1440)?

  # ── Debug ─────────────────────────────────────────────────────────────────
  debug_expose_port: bool
