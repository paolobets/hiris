name: "HIRIS"
version: "0.0.9"
slug: "hiris"
description: >-
  Home Intelligent Reasoning & Integration System.
  AI-powered agent platform for smart home management.
  Combines Claude AI reasoning with Home Assistant automation.
url: "https://github.com/paolobets/hiris"
homeassistant: "2023.1.0"
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "HIRIS HTTP API (direct access for testing)"
panel_icon: mdi:robot
panel_title: HIRIS
startup: services
stage: experimental
init: false
hassio_api: true
homeassistant_api: true
options:
  claude_api_key: ""
  log_level: "info"
  theme: "auto"
schema:
  claude_api_key: password
  log_level: "list(debug|info|warning|error)"
  theme: "list(light|dark|auto)"
