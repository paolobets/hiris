name: "HIRIS"
version: "0.6.3"
slug: "hiris"
description: >-
  Home Intelligent Reasoning & Integration System.
  AI-powered agent platform for smart home management.
  Combines Claude AI reasoning with Home Assistant automation.
url: "https://github.com/paolobets/hiris"
homeassistant: "2023.1.0"
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
panel_icon: mdi:robot
panel_title: HIRIS
startup: services
stage: experimental
init: false
map:
  - config:rw
hassio_api: true
homeassistant_api: true
options:
  claude_api_key: ""
  log_level: "info"
  theme: "auto"
  primary_model: "claude-sonnet-4-6"
  local_model_url: ""
  local_model_name: ""
  internal_token: ""
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  apprise_urls: []
  openai_api_key: ""
  llm_strategy: "balanced"
  memory_embedding_provider: ""
  memory_embedding_model: ""
  memory_rag_k: 5
  memory_retention_days: 90
  history_retention_days: 90
schema:
  claude_api_key: password
  log_level: "list(debug|info|warning|error)"
  theme: "list(light|dark|auto)"
  primary_model: str
  local_model_url: str
  local_model_name: str
  internal_token: password
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  apprise_urls:
    - str
  openai_api_key: password
  llm_strategy: "list(balanced|cost_first|quality_first)"
  memory_embedding_provider: str
  memory_embedding_model: str
  memory_rag_k: int
  memory_retention_days: int
  history_retention_days: int
