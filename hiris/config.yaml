name: "HIRIS"
version: "0.6.13"
slug: "hiris"
description: >-
  Home Intelligent Reasoning & Integration System.
  AI-powered agent platform for smart home management.
  Combines Claude AI reasoning with Home Assistant automation.
url: "https://github.com/paolobets/hiris"
homeassistant: "2023.1.0"
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
panel_icon: mdi:robot
panel_title: HIRIS
startup: services
stage: experimental
init: false
map:
  - config:rw
hassio_api: true
homeassistant_api: true

options:
  # ── AI Providers ──────────────────────────────────────────────────────────
  claude_api_key: ""
  openai_api_key: ""
  primary_model: "claude-sonnet-4-6"
  llm_strategy: "balanced"

  # ── Local Model (Ollama) ──────────────────────────────────────────────────
  local_model:
    url: ""
    model: ""

  # ── MQTT ─────────────────────────────────────────────────────────────────
  mqtt:
    host: ""
    port: 1883
    user: ""
    password: ""

  # ── Memory & RAG ──────────────────────────────────────────────────────────
  memory:
    embedding_provider: ""
    embedding_model: ""
    rag_k: 5
    retention_days: 90

  # ── General ───────────────────────────────────────────────────────────────
  internal_token: ""
  log_level: "info"
  theme: "auto"
  apprise_urls: []
  history_retention_days: 90

schema:
  # ── AI Providers ──────────────────────────────────────────────────────────
  claude_api_key: password
  openai_api_key: password
  primary_model: str
  llm_strategy: "list(balanced|cost_first|quality_first)"

  # ── Local Model (Ollama) ──────────────────────────────────────────────────
  local_model:
    url: str
    model: str

  # ── MQTT ─────────────────────────────────────────────────────────────────
  mqtt:
    host: str
    port: int
    user: str
    password: password

  # ── Memory & RAG ──────────────────────────────────────────────────────────
  memory:
    embedding_provider: str
    embedding_model: str
    rag_k: int
    retention_days: int

  # ── General ───────────────────────────────────────────────────────────────
  internal_token: password
  log_level: "list(debug|info|warning|error)"
  theme: "list(light|dark|auto)"
  apprise_urls:
    - str
  history_retention_days: int
