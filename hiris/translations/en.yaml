configuration:
  claude_api_key:
    name: "Claude API Key"
    description: "API key for Anthropic Claude. Required if you want to use Claude as the AI provider. Get it at console.anthropic.com. PRIVACY: messages and context are sent to Anthropic servers (US) — see anthropic.com/privacy."
  openai_api_key:
    name: "OpenAI API Key"
    description: "API key for OpenAI models (GPT-4o, o1, etc.). Required only if you select an OpenAI model as primary. PRIVACY: messages are sent to OpenAI servers (US) — see openai.com/policies."
  openrouter_api_key:
    name: "OpenRouter API Key"
    description: "API key for OpenRouter — a unified proxy giving access to 200+ models (Claude, GPT, Llama, Gemini, Mistral, Qwen, DeepSeek, ...) with one key. Get it at openrouter.ai. Free models are available (':free' suffix, e.g. 'meta-llama/llama-3.3-70b-instruct:free'). To use, set Primary Model or the agent model field to 'openrouter:provider/model-name'. PRIVACY: messages flow through OpenRouter (US) and then to the chosen model's provider — see openrouter.ai/privacy."
  hide_free_models:
    name: "Hide :free OpenRouter models"
    description: "When enabled, OpenRouter ':free' models are hidden from the model dropdown in the Agent Designer. Useful if you have purchased OpenRouter credit and prefer to avoid the low daily quota and frequent upstream rate-limits of the free tier."
  primary_model:
    name: "Primary Model"
    description: "The AI model used by HIRIS for reasoning and responses. Examples: claude-sonnet-4-6, claude-opus-4-7, gpt-4o."
  llm_strategy:
    name: "LLM Strategy"
    description: "How HIRIS selects models when multiple are available. 'balanced' uses cost/quality balance, 'cost_first' prefers cheaper models, 'quality_first' always uses the best."
  local_model:
    name: "Local Model (Ollama)"
    description: "Settings for a locally hosted Ollama model. Leave empty if you do not use Ollama."
    url:
      name: "Ollama URL"
      description: "Base URL of your Ollama instance. Example: http://192.168.1.10:11434"
    model:
      name: "Ollama Model Name"
      description: "Name of the Ollama model to use. Example: llama3, mistral, phi3."
    request_timeout:
      name: "Ollama request timeout (seconds)"
      description: "Maximum wait time for a single Ollama call. Default 120s. Increase for slow hardware running large models (Pi 5 with gemma2:9b may need 240–300s). Range: 10–1800."
  mqtt:
    name: "MQTT"
    description: "MQTT broker settings for receiving commands and events via message queue. Leave empty if MQTT is not used."
    host:
      name: "MQTT Host"
      description: "Hostname or IP address of your MQTT broker. Example: 192.168.1.10 or core-mosquitto."
    port:
      name: "MQTT Port"
      description: "Port of the MQTT broker. Default is 1883."
    user:
      name: "MQTT Username"
      description: "Username for MQTT authentication. Leave empty if no authentication is required."
    password:
      name: "MQTT Password"
      description: "Password for MQTT authentication. Leave empty if no authentication is required."
  memory:
    name: "Memory & RAG"
    description: "Settings for HIRIS long-term memory and semantic search (RAG). Leave embedding fields empty to disable RAG."
    embedding_provider:
      name: "Embedding Provider"
      description: "Provider for semantic memory embeddings. Options: 'openai' (requires API key), 'ollama' (requires local server), 'model2vec' (fully local, no server, works on all platforms). Leave empty to disable RAG."
    embedding_model:
      name: "Embedding Model"
      description: "Model for generating embeddings. openai: text-embedding-3-small. ollama: nomic-embed-text. model2vec: minishlab/potion-base-8M or potion-base-32M (leave empty for default)."
    rag_k:
      name: "RAG Results (k)"
      description: "Number of relevant memories returned during semantic search. Higher values give more context but increase token usage."
    retention_days:
      name: "Memory Retention (days)"
      description: "How many days to keep memories before automatic deletion. Default is 90 days."
  internal_token:
    name: "Internal Token"
    description: "Secret token used to secure internal API calls between HIRIS components. Leave empty to auto-generate."
  log_level:
    name: "Log Level"
    description: "Verbosity of add-on logs. Use 'debug' for troubleshooting, 'info' for normal operation, 'warning' or 'error' for minimal output."
  theme:
    name: "Theme"
    description: "Color theme for the HIRIS web interface. 'auto' follows your system preference."
  apprise_urls:
    name: "Notification URLs (Apprise)"
    description: "List of Apprise-compatible URLs for sending notifications (e.g. Telegram, WhatsApp, email). See apprise.readthedocs.io for supported formats."
  history_retention_days:
    name: "Conversation History Retention (days)"
    description: "How many days to keep conversation history before automatic deletion. Default is 90 days."
  debug_expose_port:
    name: "🛠 Debug — expose port (DEV ONLY)"
    description: >-
      ⚠️ ENABLE ONLY FOR DEV/DIAGNOSTICS. When enabled, a warning is logged
      at every addon startup. To actually expose port 8099 on LAN: go to
      'Network' (below this section) and set '8099/tcp' = 8099, then Save +
      Restart. Disable and clear the port mapping when done. Without HTTPS,
      anyone on the LAN can call /api/* (only internal_token as a barrier).
      DO NOT leave enabled in production.

