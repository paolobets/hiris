<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>drawer atom smoke</title>
<style>
/* minimal inline styles for smoke (CSS atoms in hiris-config.css arrive in Phase 3.3) */
.drawer-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none; }
.drawer-overlay.open { display:block; }
.drawer { position:fixed;top:0;right:0;bottom:0;width:420px;background:#fff;border-left:1px solid #ccc;
  transform:translateX(100%);transition:transform 0.22s;display:flex;flex-direction:column;z-index:101; }
.drawer.open { transform:translateX(0); }
.drawer-head { padding:16px;border-bottom:1px solid #eee;display:flex;align-items:baseline; }
.drawer-head h3 { margin:0;flex:1; }
.drawer-close { margin-left:auto;width:28px;height:28px;cursor:pointer;background:none;border:0;font-size:20px; }
.drawer-body { flex:1;padding:16px;overflow-y:auto; }
.drawer-foot { padding:12px 16px;border-top:1px solid #eee;display:flex;gap:8px;justify-content:flex-end; }
.btn { padding:6px 12px;border:1px solid #ccc;background:#fafafa;cursor:pointer; }
.btn-primary { background:#6366f1;color:#fff;border-color:#6366f1; }
</style>
</head><body style="font-family:sans-serif">
<h1>Drawer smoke</h1>
<pre id="out"></pre>
<button id="open-btn" class="btn">Open drawer</button>
<div id="drawer-container"></div>
<script src="../../hiris/app/static/config/drawer.js"></script>
<script>
var out = document.getElementById('out');
var log = [];
function ok(label, cond) { log.push((cond ? 'PASS' : 'FAIL') + ' · ' + label); out.textContent = log.join('\n'); }

ok('HirisDrawer exists', typeof HirisDrawer === 'object');
ok('isOpen() false initially', HirisDrawer.isOpen() === false);

document.getElementById('open-btn').onclick = function() {
  var confirmFired = false;
  HirisDrawer.open({
    title: 'Test drawer',
    body: '<div><strong>Body content</strong></div>',
    onConfirm: function() { confirmFired = true; ok('onConfirm fired before close', confirmFired); },
    onCancel: function() { ok('onCancel called', true); },
  });
  setTimeout(function() {
    ok('drawer DOM mounted with open class', document.querySelector('.drawer.open') !== null);
    ok('overlay DOM mounted with open class', document.querySelector('.drawer-overlay.open') !== null);
    ok('isOpen() true after open', HirisDrawer.isOpen() === true);
  }, 50);
};
</script>
<p style="color:#888;font-size:12px;margin-top:24px">Click "Open drawer" e poi clicca su × o overlay o premi ESC per chiudere. Verifica i risultati nell'output sopra.</p>
</body></html>
